<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe AI - Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-page">
        <header class="game-header">
            <a href="index.html" class="back-button">← Back</a>

            <div class="game-info">
                <div class="difficulty-badge" id="difficultyBadge">Hard</div>
                <div class="turn-indicator" id="turnIndicator">👤 Your Turn</div>
            </div>

            <button class="theme-toggle" id="themeToggle" title="Toggle Dark Mode">
                <span id="themeIcon">☀️</span>
            </button>
        </header>

        <main class="game-container">
            <!-- Scores -->
            <div class="scores-container">
                <div class="score-card player">
                    <span class="score-label">You</span>
                    <span class="score-value" id="playerScore">0</span>
                </div>
                <div class="score-card draw">
                    <span class="score-label">Draw</span>
                    <span class="score-value" id="drawScore">0</span>
                </div>
                <div class="score-card ai">
                    <span class="score-label">AI</span>
                    <span class="score-value" id="aiScore">0</span>
                </div>
            </div>

            <!-- Game Board -->
            <div class="board-container">
                <div class="game-board" id="gameBoard">
                    <!-- Cells will be generated by JavaScript -->
                    <div class="cell" data-index="0"></div>
                    <div class="cell" data-index="1"></div>
                    <div class="cell" data-index="2"></div>
                    <div class="cell" data-index="3"></div>
                    <div class="cell" data-index="4"></div>
                    <div class="cell" data-index="5"></div>
                    <div class="cell" data-index="6"></div>
                    <div class="cell" data-index="7"></div>
                    <div class="cell" data-index="8"></div>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls">
                <button class="control-btn restart-btn" id="restartBtn">⟳ Restart Game</button>
                <a href="scoreboard.html" class="control-btn scoreboard-btn">📊 Scoreboard</a>
            </div>
        </main>
    </div>

    <!-- Game Over Modal -->
    <div class="modal" id="gameOverModal" style="display: none;">
        <div class="modal-content">
            <div class="modal-icon" id="modalIcon">🎉</div>
            <h2 id="modalTitle">You Won!</h2>
            <p id="modalMessage">Congratulations, you beat the AI!</p>

            <div class="modal-buttons">
                <button class="modal-btn play-again" id="playAgainBtn">Play Again</button>
                <a href="index.html" class="modal-btn change-difficulty">Change Difficulty</a>
            </div>
        </div>
    </div>

    <script src="ai.js"></script>
    <script src="script.js"></script>
</body>
</html>
